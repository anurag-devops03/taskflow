services:

  postgres:
    image: postgres:15
    container_name: taskflow-postgres
    restart: always
    environment:
      POSTGRES_USER: taskflow_user
      POSTGRES_PASSWORD: taskflow_pass
      POSTGRES_DB: taskflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskflow_user -d taskflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: anuragdevops03/taskflow:latest
    container_name: taskflow-app
    restart: always
    ports:
      - "8000:8000"
    environment:
      APP_ENV: development
      SECRET_KEY: supersecretkey123
      DATABASE_URL: postgresql+asyncpg://taskflow_user:taskflow_pass@postgres:5432/taskflow
      SYNC_DATABASE_URL: postgresql://taskflow_user:taskflow_pass@postgres:5432/taskflow
      JWT_SECRET_KEY: 09d25e094faa6ca2556c818166b7a9563b93f7099f6f0f4caa6cf63b88e8d3e7
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: "30"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
